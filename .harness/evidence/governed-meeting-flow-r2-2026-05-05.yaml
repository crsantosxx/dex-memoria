pensamento:
  owner: rita-reuniao
  cooperadores: chato, questionador, curioso, adversario-codigo, akita-dev-raiz, kant, fowler-evolutivo, estacionamento, garimpeiro, ancora-fluxo, dex-harness-project-setup, sentinela-llm
  method: Divergence -> Convergence -> Actionable -> Gate
  reason: Material visual findings and Dex Harness workflow findings needed visible governance instead of cosmetic specialist credits.
  material_credits:
    chato: blocked names-only specialist credits and flagged wasted topbar space.
    questionador: clarified that workflow documentation is not the same as meeting evidence.
    curioso: mapped the user-visible uncertainty around inaccessible scroll and unused layout space.
    akita-dev-raiz: validated that the harness needs executable gates, not only prose.
    sentinela-llm: separated trusted workflow docs from untrusted visual/browser observations.
  next: run governed-meeting-flow-gate against this evidence artifact.
  back_to: divergence if the sensor fails or if a material UI decision lacks a gate.

divergence:
  chato: blocked cosmetic specialist participation and required evidence for each material credit.
  questionador: clarified the hidden assumption that a workflow guide could substitute for a governed meeting artifact.
  curioso: mapped the real-use questions around mobile reach, topbar waste and conversation composer access.
  adversario-codigo: rejected ready-pass without executable sensor proof and target-specific artifact validation.

convergence:
  akita-dev-raiz: validated the root dex-harness patch and required sensor tests before local sync.
  kant: selected the smallest verifiable implementation: spec, guide, workflow, sensor and tests.
  fowler-evolutivo: mapped the incremental path from local dogfood finding to reusable harness rule.
  mapeador-implementacao: proposed concrete surfaces for implementation and sync.
  revisor-codigo: validated that cosmetic credits fail and complete artifacts pass in tests.
  validador-pronto: required the governed-meeting-flow-gate result before treating the method as active.

vivos:
  estacionamento: parked DEX-R2-005 as the need for Pensamento and Planejamento to become formal harness rails.
  garimpeiro: mined the reusable rule that material specialist work needs phase, contribution and evidence.
  ancora-fluxo: kept next and back_to visible for the current visual audit cycle.
  dex-harness-project-setup: synchronized root and local harness surfaces after commit c024ec2.
  sentinela-llm: mapped the trust boundary between MCP events, browser screenshots, local files and deployment evidence.

planejamento:
  owner: paula-planeja
  material_credits: chato blocked cosmetic credits; questionador blocked guide-as-evidence; akita and validador required executable gate; estacionamento and garimpeiro preserved learning.
  meeting_id: REUNIAO-R2-TOPO-MIOLO
  decision: Pensamento and Planejamento are now a governed Dex Harness rail for material decisions.
  next: register the local sensor and resume visual layout implementation.
  back_to: divergence if a new material finding appears without meeting evidence.

actionable:
  proposal: Institutionalize governed meeting flow for material decisions in the current visual audit cycle.
  files:
    - C:\CodexProjetos\dex-harness\.harness\scripts\check-governed-meeting-flow.cjs
    - C:\CodexProjetos\dex-harness\.harness\sensors\governed-meeting-flow-gate.yaml
    - C:\CodexProjetos\dex-harness\.harness\workflows\governed-meeting-flow.md
    - C:\CodexProjetos\AgendadorConsultasOticas\.harness\evidence\governed-meeting-flow-r2-2026-05-05.yaml
  surfaces:
    - Dex Harness Pensamento
    - Dex Harness Planejamento
    - Dashboard credits
    - Visual audit flow gates
  tests: npm test -- tests/sensors/runner.spec.ts passed 18/18 in C:\CodexProjetos\dex-harness.
  recommendation: keep

gate:
  advance_when: governed-meeting-flow-gate passes against this evidence artifact.
  regress_when: a material decision names specialists without phase, contribution and evidence.
  stop_when: no sensor or judge result exists for a ready-pass or material-pass claim.
  principal_validation: sensor governed-meeting-flow-gate passed against .harness/evidence/governed-meeting-flow-r2-2026-05-05.yaml
