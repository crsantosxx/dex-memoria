id: project-setup
title: Dex Memoria Project Setup
objective: Provar e observar o dex-harness neste projeto sem tocar em runtime, secrets, publicacao ou configuracao global.
workflow: harness://workflows/project-setup
scope:
  include:
    - .codex/config.toml
    - .harness/workflows/project-setup.md
    - .harness/guides/skills/specialist-cooperation.md
    - README.md
    - SPEC.md
  exclude:
    - .env
    - .env.*
    - .harness/.local
    - node_modules
    - logs
    - cache
    - publicacao remota
    - alteracao de configuracao global do cliente
acceptance_criteria:
  - O servidor MCP project-named do dex-memoria esta visivel na janela atual.
  - HARNESS_ROOT aponta para C:\CodexProjetos\dex-memoria\.harness.
  - cwd aponta para C:\CodexProjetos\dex-memoria.
  - A sessao project-setup tem session_id e decisao inicial registrada.
  - Achados materiais sao registrados como review_finding.
  - Transicoes ou paradas sao registradas como flow_gate.
  - O dashboard local e renderizado ou o motivo de parada e registrado.
checks: []
tasks:
  - id: prove-project-setup
    title: Provar setup local do dex-harness
    description: Validar MCP, HARNESS_ROOT, cwd, sessao, eventos obrigatorios e dashboard local para dex-memoria.
out_of_scope:
  - Ler .env, tokens, secrets, logs ou caches.
  - Criar ou alterar runtime do Dex Agent.
  - Publicar, pushar ou alterar repos remotos.
  - Reverter delecoes existentes em .harness sem autorizacao explicita.
