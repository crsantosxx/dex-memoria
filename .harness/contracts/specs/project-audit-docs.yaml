id: project-audit-docs
title: Project Audit Docs
objective: Auditar a documentacao do dex-memoria sem implementar runtime, scripts, hooks ou automacao de ledger.
guide: harness://guides/rules/project-audit-docs
scope:
  include:
    - README.md
    - SPEC.md
    - SKILL.md
    - docs/
    - templates/
    - examples/
  exclude:
    - sensors
    - judges
    - runtime
    - scripts
    - hooks
    - ledger automatico
    - .env
    - secrets
    - logs
    - .harness/.local
    - node_modules
acceptance_criteria:
  - O pacote continua descrito como documental V1, nao como runtime do Dex Agent.
  - README.md, SPEC.md e SKILL.md nao prometem comandos, hooks, scripts ou escrita automatica que nao existem.
  - A fronteira com Dex Agent permanece clara nos documentos essenciais.
  - Templates pedem fonte de verdade, criterio de resolucao, quando lembrar e quando nao lembrar.
  - Examples permanecem sanitizados e nao parecem estado real sensivel.
  - Memoria resolvida, arquivada ou superseded nao vira proximo passo operacional.
  - O resultado da auditoria declara excesso identificado, se houver, e o menor proximo corte verificavel.
checks: []
tasks:
  - id: review-readme
    title: Revisar README.md
    description: Confirmar que README.md apresenta dex-memoria como pacote documental e nao como runtime.
  - id: review-spec
    title: Revisar SPEC.md
    description: Confirmar escopo V1, fora de escopo e criterios de regressao.
  - id: review-skill
    title: Revisar SKILL.md
    description: Confirmar que a skill direciona para contrato, templates e exemplos sem prometer execucao automatica.
  - id: review-docs
    title: Revisar docs/
    description: Confirmar fronteira com Dex Agent e uso documental.
  - id: review-templates
    title: Revisar templates/
    description: Confirmar campos de memoria forte, fonte de verdade e criterio de saida.
  - id: review-examples
    title: Revisar examples/
    description: Confirmar exemplos sanitizados e sem memoria resolvida como proximo passo.
out_of_scope:
  - Criar sensors.
  - Criar judges.
  - Criar workflow.
  - Implementar runtime.
  - Adicionar scripts ou hooks.
  - Escrever ledger automatico.
  - Alterar documentos principais durante esta spec.
