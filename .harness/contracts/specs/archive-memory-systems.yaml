id: archive-memory-systems
title: Archive legacy memory systems
objective: Arquivar e desacoplar os sistemas antigos de memoria sem perder rollback, sem apagar evidencia historica util e sem deixar links vivos para camadas aposentadas.
workflow: harness://workflows/project-setup
flow:
  coordinator: ancora-fluxo
  planning_owner: sprinter
  checklist_owner: checklist-visual
  cooperation_lead: kant
  immediate_advisors:
    - chato
    - garimpeiro
    - estacionamento
    - akita-dev-raiz
    - atlas
    - duda-dev
    - mapeador-implementacao
scope:
  include:
    archive_destination: C:\Users\crsan\.codex\ARQUIVADO
    direct_targets:
      - C:\CodexProjetos\memory-bank
      - C:\Users\crsan\.agents\skills\memorizador
      - C:\CodexProjetos\memory_agent_codex_local
      - C:\Users\crsan\.codex\skills\roteador-memoria
    search_roots:
      - C:\CodexProjetos
      - D:\Drive\SegundaMente\CrSantos
  exclude:
    - ler ou imprimir .env, tokens ou secrets
    - apagar historico sem manifesto
    - remover referencia historica que nao seja link vivo
    - editar repos remotos, commit ou push
acceptance_criteria:
  - A spec e as tasks existem no dex-harness e registram Sprinter, Checklist Visual e ancora-fluxo no fluxo.
  - Existe manifesto de inventario e rollback antes de qualquer movimentacao.
  - Os alvos diretos aprovados sao movidos para uma pasta datada em C:\Users\crsan\.codex\ARQUIVADO.
  - Links vivos para os alvos arquivados sao removidos, desativados ou marcados como legado conforme classificacao.
  - Referencias historicas preservadas nao sao tratadas como instalacao ativa.
  - A busca final em C:\CodexProjetos e D:\Drive\SegundaMente\CrSantos nao encontra links vivos indevidos para os sistemas aposentados.
  - O dashboard oficial do dex-harness e renderizado no fechamento.
checks: []
tasks:
  - id: archive-memory-systems-plan
    title: Criar inventario reversivel e checklist de execucao
    description: Usar Sprinter e Checklist Visual para transformar o pedido em backlog verificavel antes da movimentacao.
  - id: archive-memory-systems-move
    title: Arquivar alvos diretos
    description: Mover alvos diretos para ARQUIVADO com manifesto de rollback preservado.
  - id: archive-memory-systems-unlink
    title: Desfazer links vivos
    description: Remover, desativar ou marcar como legado os links vivos encontrados nos roots conferidos.
  - id: archive-memory-systems-validate
    title: Validar ausencia de links vivos indevidos
    description: Rodar busca final e consolidar excecoes historicas preservadas.
out_of_scope:
  - Abrir, ler, imprimir ou publicar segredos.
  - Commit, push, release ou publicacao remota.
  - Reescrever historico narrativo amplo.
  - Criar novo sistema de memoria substituto.
