id: normalize-global-memory-write-policy
title: Normalize global memory write policy across dex-memoria and Dex Agent copies
objective: Padronizar todos os contratos e copias de dex-memoria/Dex Agent para tratar memoria global como indice gravavel de ponteiros curtos em C:\Users\crsan\.codex\memories, sem gravar conteudo grande e sem tratar dex-memoria como veto.
workflow: harness://workflows/PREVC
flow:
  coordinator: ancora-fluxo
  phases:
    planejamento:
      owner: sprinter
      cooperation:
        - akita-dev-raiz
    construir:
      owner: mapeador-implementacao
      executor: duda-dev
    revisar:
      owner: revisor-codigo
    veredito:
      owner: validador-pronto
  flow_gates:
    - pre-flight antes de inventario, implementacao, review e veredito
    - return-flight se uma copia divergir, um teste fixar read-only antigo ou houver risco de escrita ampla
    - post-flight com creditos materiais e evidencia objetiva
scope:
  include:
    canonical_package:
      - C:\CodexProjetos\dex-memoria
    primary_runtime:
      - C:\CodexProjetos\dex-agent
      - C:\CodexProjetos\ConfiguracoesWindows
    replica_roots:
      - C:\CodexProjetos
      - D:\Drive\SegundaMente\CrSantos\skills\dex-agent\skills
    known_local_dex_memoria_copies:
      - C:\CodexProjetos\dex-agent\skills\dex-memoria
      - C:\CodexProjetos\ConfiguracoesWindows\skills\dex-agent\skills\dex-memoria
      - C:\CodexProjetos\ControlePessoal\skills\dex-agent\skills\dex-memoria
      - C:\CodexProjetos\CriadorAgentico\skills\dex-agent\skills\dex-memoria
      - C:\CodexProjetos\PremierAgenda\skills\dex-agent\skills\dex-memoria
      - D:\Drive\SegundaMente\CrSantos\skills\dex-agent\skills\dex-memoria
    known_policy_conflicts:
      - C:\CodexProjetos\dex-agent\docs\memory-system\README.md
      - C:\CodexProjetos\dex-agent\tests\projectMemoryService.test.ts
      - C:\CodexProjetos\ConfiguracoesWindows\skills\dex-agent\docs\memory-system\README.md
      - C:\CodexProjetos\ConfiguracoesWindows\skills\dex-agent\tests\projectMemoryService.test.ts
      - C:\CodexProjetos\ControlePessoal\skills\dex-agent\docs\memory-system\README.md
      - C:\CodexProjetos\ControlePessoal\skills\dex-agent\tests\projectMemoryService.test.ts
      - C:\CodexProjetos\CriadorAgentico\skills\dex-agent\tests\projectMemoryService.test.ts
      - C:\CodexProjetos\PremierAgenda\skills\dex-agent\docs\memory-system\README.md
      - C:\CodexProjetos\PremierAgenda\skills\dex-agent\tests\projectMemoryService.test.ts
      - C:\CodexProjetos\AgendadorConsultasOticas\README.md
  exclude:
    - .env
    - .env.*
    - tokens, secrets ou credenciais
    - logs brutos
    - .harness/.local
    - .harness/**/sessions
    - telemetry
    - node_modules
    - dist
    - caches e perfis de browser
    - commit, push, release ou publicacao remota
policy_target:
  canonical_rule: Quando uma lembranca tiver valor de lembranca/indexacao cross-project, a camada autorizada deve gravar um ponteiro global curto em C:\Users\crsan\.codex\memories\MEMORY.md, sem copiar conteudo grande.
  default_rule: Memoria global e indice gravavel de ponteiros concisos; nao e tutorial, dump, copia de contrato grande nem armazenamento de fonte completa.
  pointer_shape:
    - gatilho de recuperacao
    - fonte viva completa
    - o que procurar na fonte viva
    - quem vence em conflito
    - quando nao usar
    - criterio de revisao ou remocao
  forbidden_global_payloads:
    - logs brutos
    - sessoes completas
    - conteudo grande de documentos ou historico
    - segredos, tokens, chaves, identificadores sensiveis ou dados pessoais desnecessarios
    - duplicacao de ledger local, ACTIVE, HANDOFF ou contrato completo
acceptance_criteria:
  - O inventario cobre C:\CodexProjetos, C:\CodexProjetos\dex-agent, C:\CodexProjetos\ConfiguracoesWindows e D:\Drive\SegundaMente\CrSantos\skills\dex-agent\skills com exclusoes seguras.
  - Todas as copias locais de dex-memoria encontradas declaram a mesma regra canonica de pedido explicito, ponteiro curto e nao-veto.
  - A documentacao do Dex Agent deixa de dizer que memoria global e somente leitura como regra geral; ela separa adaptador de recall, rota de escrita de ponteiro conciso e proibicao de payload grande.
  - Os testes que fixam "global memory read-only" ou "consultation-only" sao atualizados para o novo contrato: nao mesclar no ledger local, mas gravar ponteiro global curto quando memoria duravel for promovida.
  - Existe caminho implementado ou claramente contratado para gravar ponteiro curto em C:\Users\crsan\.codex\memories\MEMORY.md quando houver valor de lembranca/indexacao.
  - C:\CodexProjetos\ConfiguracoesWindows deixa de causar conflito com o contrato canonico e passa a apontar para dex-memoria como fonte de regra.
  - AgendadorConsultasOticas e demais repos deixam de afirmar que a memoria global e somente leitura, exceto quando descrevem apenas um adaptador especifico de recall sem capacidade de escrita.
  - A busca final nao encontra bloqueios ativos como "memoria global continua somente leitura", "keep global memory read-only" ou "nao gravar memoria global diretamente" fora de historico, rollout, fixture intencional de teste negativo ou documentacao arquivada.
  - Review tecnico confirma que a mudanca nao abre escrita ampla, duplicacao de memoria grande, vazamento de segredo ou mistura indevida entre memoria global e ledger local.
  - Validacao final declara testes executados, buscas executadas, lacunas restantes e veredito.
checks:
  - kind: judge
    rubric: spec-adherence
  - kind: judge
    rubric: akita-technical-reality-check
tasks:
  - id: normalize-global-memory-write-inventory
    title: Inventariar conflitos de memoria global e copias de dex-memoria
    description: Mapear todos os arquivos vivos que fixam memoria global como read-only/consultation-only ou carregam copia local de dex-memoria nos roots definidos.
  - id: normalize-global-memory-write-contracts
    title: Normalizar contratos e documentacao canonica
    description: Atualizar dex-memoria canonico e copias locais para a regra de ponteiro global curto por pedido explicito.
  - id: normalize-global-memory-write-runtime
    title: Ajustar Dex Agent runtime, docs e testes principais
    description: Corrigir docs/testes/codigo do Dex Agent para separar recall global, escrita explicita de ponteiro curto e ledger local.
  - id: normalize-global-memory-write-replicas
    title: Normalizar copias e repositorios filhos
    description: Aplicar a mesma politica em ConfiguracoesWindows, ControlePessoal, CriadorAgentico, PremierAgenda, AgendadorConsultasOticas e D:\Drive\SegundaMente\CrSantos conforme inventario.
  - id: normalize-global-memory-write-validate
    title: Validar ausencia de bloqueios ativos e prontidao
    description: Rodar buscas finais, testes proporcionais e review/veredito com os especialistas declarados.
  - id: normalize-global-memory-pointer-indexing
    title: Tornar memoria global indice gravavel de ponteiros
    description: Corrigir a politica posterior para que ponteiros globais concisos sejam gravados quando houver valor de lembranca/indexacao, sem depender da ideia de read-only ou excecao estreita por pedido explicito.
out_of_scope:
  - Escrever conteudo grande em C:\Users\crsan\.codex\memories.
  - Editar memory_summary.md manualmente.
  - Ler ou imprimir segredos, logs brutos, sessoes, caches ou perfis de navegador.
  - Alterar comportamento de memoria sem teste ou evidencia.
  - Commit, push, release ou publicacao remota.
